stages:
  - build
  - test
  - security
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

# ---------------- BUILD ----------------
build:
  stage: build
  image: python:3.11-slim
  script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - echo "Build successful"
  only:
    - main
    - develop

# ---------------- TEST ----------------
test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pytest tests/ -v --junitxml=test-results.xml
  artifacts:
    when: always
    reports:
      junit: test-results.xml
    paths:
      - test-results.xml
  allow_failure: false

# ---------------- SECURITY ----------------
security:
  stage: security
  image: python:3.11-slim
  before_script:
    - pip install bandit
  script:
    - echo "Running security scan..."
    - bandit -r . -f json -o bandit-report.json || true
    - bandit -r . -f txt || true
  artifacts:
    paths:
      - bandit-report.json
  allow_failure: true
# ---------------- DEPLOY (optional manual) ----------------
deploy:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Deploy step running..."
    - chmod +x deploy.sh || true
    - ./deploy.sh || echo "No deploy script found"
  when: manual
  only:
    - main
