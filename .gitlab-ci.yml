stages:
  - build
  - test
  - security
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  LATEST_IMAGE: $CI_REGISTRY_IMAGE:latest

before_script:
  - python --version

build:
  stage: build
  image: python:3.11-slim
  script:
    - echo "Installing dependencies..."
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - echo "Build completed successfully"
  artifacts:
    paths:
      - requirements.txt
    expire_in: 1 hour
  only:
    - main
    - develop

test:
  stage: test
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y gcc default-libmysqlclient-dev pkg-config
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - echo "Running unit tests..."
    - pytest tests/ -v --tb=short
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      junit: test-results.xml
  only:
    - main
    - develop
    - merge_requests

security:
  stage: security
  image: python:3.11-slim
  before_script:
    - pip install bandit
  script:
    - echo "Running security scan..."
    - bandit -r . -f json -o bandit-report.json || true
    - bandit -r . -f txt
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 1 week
  allow_failure: true
  only:
    - main
    - develop
    - merge_requests

deploy:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add --no-cache bash
  script:
    - echo "Starting deployment..."
    - chmod +x deploy.sh
    - ./deploy.sh
  only:
    - main
  when: manual
  environment:
    name: production
    url: http://your-production-url.com
