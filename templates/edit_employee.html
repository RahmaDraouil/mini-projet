{% extends "base.html" %}

{% block title %}Edit Employee{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-edit"></i> Edit Employee</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('employee.edit_employee', id=employee.id) }}">
                    <div class="mb-3">
                        <label for="full_name" class="form-label">Full Name *</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" 
                               value="{{ employee.full_name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email *</label>
                        <input type="email" class="form-control" id="email" name="email" 
                               value="{{ employee.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="department" class="form-label">Department *</label>
                        <input type="text" class="form-control" id="department" name="department" 
                               value="{{ employee.department }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="salary" class="form-label">Salary *</label>
                        <input type="number" step="0.01" class="form-control" id="salary" name="salary" 
                               value="{{ employee.salary }}" required>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Update Employee
                        </button>
                        <a href="{{ url_for('employee.index') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
